# NetSite REST API — OpenAPI 3.1 specification.
#
# What: the contract between the NetSite control plane and every
# client that talks to it (operator browser, ns CLI, POPs, future
# integrations). Hand-written and lint-checked in CI; the Go handlers
# are validated against this contract by inspection during code review.
#
# How: per OQ-02 (PROJECT_STATE.md §5), we hand-write the spec rather
# than generate handlers from it. The trade-off: we get a clean
# diligence story (no oapi-codegen quirks in the dependency graph) at
# the cost of having to keep this file and the Go handlers manually
# aligned. CI runs `redocly lint` to catch malformed YAML and contract
# regressions early.
#
# Why OpenAPI 3.1 (not 3.0): 3.1 maps cleanly onto JSON Schema 2020-12,
# which is what we want for any future code-gen consumers and what
# Redoc/Swagger UI 5+ render natively.

openapi: "3.1.0"
info:
  title: NetSite Control Plane API
  version: "0.0.13"
  description: |
    The NetSite control plane HTTP surface. All endpoints are under
    `/v1/`; breaking changes ship as `/v2/` and run side-by-side with
    `/v1/` until clients migrate.

    Authentication is cookie-based: a successful POST to
    `/v1/auth/login` sets `ns_session`; subsequent requests carry it
    automatically (HttpOnly + SameSite=Lax + Secure).

    Error responses use plain text bodies for now; structured error
    objects ship in Phase 1 alongside the request-id propagation work.
  license:
    name: Business Source License 1.1 (Change Date 2125-01-01, Apache 2.0)
    url: https://mariadb.com/bsl11/
servers:
  - url: http://localhost:8080
    description: Local development (compose stack)
  - url: https://{host}
    description: Self-hosted production
    variables:
      host:
        default: netsite.example.com

tags:
  - name: health
    description: Liveness and backend reachability.
  - name: auth
    description: Cookie-based authentication.
  - name: tests
    description: Synthetic-monitoring test catalog.
  - name: pops
    description: POP (point-of-presence) roster.
  - name: slos
    description: Service-level objectives + multi-window multi-burn-rate evaluation.
  - name: workspaces
    description: Saved-view bundles. A workspace pins a list of views and gives the bundle a name; opening it later restores the page state.
  - name: share
    description: Public read-only access to shared workspaces via short slug.
  - name: annotations
    description: Operator-pinned notes scoped to a (canary | pop | test, scope_id, timestamp) tuple. Immutable; correct typos by deleting + recreating.

paths:
  /v1/health:
    get:
      tags: [health]
      summary: Liveness and backend status
      description: |
        Always returns 200 as long as the process is up. Backend
        reachability lives inside the JSON body's `backends` map; do
        not gate downstream traffic on a single backend's health here
        — use the per-backend probes in Prometheus instead.
      responses:
        "200":
          description: process up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /v1/auth/login:
    post:
      tags: [auth]
      summary: Exchange credentials for a session cookie
      description: |
        On success, sets the `ns_session` cookie (HttpOnly, SameSite=Lax,
        Secure) and returns the authenticated user. Failures collapse
        to 401 — clients cannot distinguish "no such user" from "wrong
        password" by status or body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: authenticated
          headers:
            Set-Cookie:
              description: ns_session
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: malformed request
        "401":
          description: invalid credentials

  /v1/auth/logout:
    post:
      tags: [auth]
      summary: Drop the current session
      description: |
        Idempotent: logging out an already-anonymous request returns
        204. The server-side session row (if any) is deleted; the
        cookie is cleared via Set-Cookie with MaxAge=-1.
      responses:
        "204":
          description: logged out

  /v1/auth/whoami:
    get:
      tags: [auth]
      summary: Return the current authenticated user
      description: |
        Requires a valid `ns_session` cookie. Returns 401 for
        anonymous requests or expired sessions.
      responses:
        "200":
          description: authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: unauthorized

  /v1/tests:
    get:
      tags: [tests]
      summary: List tests in the caller's tenant
      description: |
        RBAC: tests:read (viewer+).
      responses:
        "200":
          description: tests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Test" }
        "401": { description: unauthorized }
        "403": { description: forbidden }
    post:
      tags: [tests]
      summary: Create a new test in the caller's tenant
      description: |
        RBAC: tests:write (operator+).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TestRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Test" }
        "400": { description: invalid body }
        "401": { description: unauthorized }
        "403": { description: forbidden }

  /v1/tests/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [tests]
      summary: Get one test by id
      responses:
        "200":
          description: test
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Test" }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }
    delete:
      tags: [tests]
      summary: Delete one test by id
      description: |
        RBAC: tests:write (operator+).
      responses:
        "204": { description: deleted }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }

  /v1/pops:
    get:
      tags: [pops]
      summary: List POPs in the caller's tenant
      description: |
        RBAC: pops:read (viewer+).
      responses:
        "200":
          description: pops
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/POP" }
        "401": { description: unauthorized }
        "403": { description: forbidden }
    post:
      tags: [pops]
      summary: Register a new POP
      description: |
        Operator pre-registers each POP. RBAC: pops:write (operator+).
        The id field is operator-chosen because it is referenced by
        ns-pop YAML configs and Prometheus scrape targets.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/POPRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/POP" }
        "400": { description: invalid body }
        "401": { description: unauthorized }
        "403": { description: forbidden }

  /v1/pops/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [pops]
      summary: Get one POP by id
      responses:
        "200":
          description: pop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/POP" }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }
    delete:
      tags: [pops]
      summary: Delete one POP by id
      description: |
        RBAC: pops:write (operator+).
      responses:
        "204": { description: deleted }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }

  /v1/tests/{id}/results:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
    get:
      tags: [tests]
      operationId: listTestResults
      summary: List the most recent canary results for a test
      description: |
        Returns up to `limit` rows ordered by observed_at DESC. RBAC:
        tests:read (viewer+). The data lives in ClickHouse; the
        endpoint is the operator's window into the loop without
        requiring direct ClickHouse access.
      responses:
        "200":
          description: results
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CanaryResult" }
        "400": { description: bad request }
        "401": { description: unauthorized }
        "403": { description: forbidden }

  /v1/slos:
    get:
      tags: [slos]
      operationId: listSLOs
      summary: List SLOs in the caller's tenant
      description: |
        RBAC: slos:read (viewer+).
      responses:
        "200":
          description: slos
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SLO" }
        "401": { description: unauthorized }
        "403": { description: forbidden }
    post:
      tags: [slos]
      operationId: createSLO
      summary: Create a new SLO
      description: |
        RBAC: slos:write (operator+). Inputs are validated against the
        same rules as the evaluator (objective_pct in (0,1), positive
        thresholds, supported sli_kind).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SLORequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SLO" }
        "400": { description: invalid body }
        "401": { description: unauthorized }
        "403": { description: forbidden }

  /v1/slos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [slos]
      operationId: getSLO
      summary: Get one SLO by id
      description: |
        RBAC: slos:read (viewer+).
      responses:
        "200":
          description: slo
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SLO" }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }
    delete:
      tags: [slos]
      operationId: deleteSLO
      summary: Delete one SLO by id
      description: |
        RBAC: slos:write (operator+).
      responses:
        "204": { description: deleted }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }

  /v1/workspaces:
    get:
      tags: [workspaces]
      operationId: listWorkspaces
      summary: List workspaces in the calling tenant
      description: |
        Returns every workspace in the authenticated user's tenant,
        ordered by `updated_at` descending. RBAC: workspaces:read.
      responses:
        "200":
          description: list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Workspace" }
        "401": { description: unauthorized }
        "403": { description: forbidden }
    post:
      tags: [workspaces]
      operationId: createWorkspace
      summary: Create a new workspace
      description: |
        RBAC: workspaces:write. The owner is the authenticated user;
        tenant scoping is automatic.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkspaceCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "400": { description: invalid body }
        "401": { description: unauthorized }
        "403": { description: forbidden }

  /v1/workspaces/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [workspaces]
      operationId: getWorkspace
      summary: Get one workspace by id
      description: |
        RBAC: workspaces:read.
      responses:
        "200":
          description: workspace
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }
    patch:
      tags: [workspaces]
      operationId: updateWorkspace
      summary: Update mutable fields of a workspace
      description: |
        RBAC: workspaces:write. Fields omitted from the body are left
        unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkspaceUpdate" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "400": { description: invalid body }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }
    delete:
      tags: [workspaces]
      operationId: deleteWorkspace
      summary: Delete a workspace
      description: |
        RBAC: workspaces:write. Removes the row and any associated
        share slug.
      responses:
        "204": { description: deleted }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }

  /v1/workspaces/{id}/share:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [workspaces]
      operationId: shareWorkspace
      summary: Mint a share slug for a workspace
      description: |
        Returns the workspace with `share_slug` and `share_expires_at`
        populated. Calling Share twice rotates the slug; the previous
        slug is effectively revoked. RBAC: workspaces:write.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkspaceShareRequest" }
      responses:
        "200":
          description: shared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "400": { description: invalid body }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }
    delete:
      tags: [workspaces]
      operationId: unshareWorkspace
      summary: Revoke the workspace share slug
      description: |
        Clears `share_slug` and `share_expires_at`. RBAC: workspaces:write.
      responses:
        "200":
          description: revoked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }

  /v1/share/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [share]
      operationId: resolveShare
      summary: Resolve a workspace share slug
      description: |
        Public read — no auth. The slug itself is the access control.
        The response strips `tenant_id` and `owner_user_id` so an
        outside observer cannot infer who owns the share.
      responses:
        "200":
          description: workspace (sanitised)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        "404": { description: not found or expired }

  /v1/annotations:
    get:
      tags: [annotations]
      operationId: listAnnotations
      summary: List annotations
      description: |
        Filter via query string: `scope`, `scope_id`, `from`, `to`,
        `limit`. `from`/`to` are RFC3339 timestamps. RBAC:
        annotations:read.
      parameters:
        - { name: scope, in: query, schema: { type: string, enum: [canary, pop, test] } }
        - { name: scope_id, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 1000 } }
      responses:
        "200":
          description: list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Annotation" }
        "400": { description: invalid query }
        "401": { description: unauthorized }
        "403": { description: forbidden }
    post:
      tags: [annotations]
      operationId: createAnnotation
      summary: Create a new annotation
      description: |
        RBAC: annotations:write. Annotations are immutable once
        created — no PATCH endpoint. Author is the authenticated
        user; tenant scoping is automatic.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnnotationCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Annotation" }
        "400": { description: invalid body }
        "401": { description: unauthorized }
        "403": { description: forbidden }

  /v1/annotations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [annotations]
      operationId: getAnnotation
      summary: Get one annotation by id
      description: |
        RBAC: annotations:read.
      responses:
        "200":
          description: annotation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Annotation" }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }
    delete:
      tags: [annotations]
      operationId: deleteAnnotation
      summary: Delete one annotation by id
      description: |
        RBAC: annotations:write. The deletion is itself a fact in
        the audit trail — there is no soft-delete recovery.
      responses:
        "204": { description: deleted }
        "401": { description: unauthorized }
        "403": { description: forbidden }
        "404": { description: not found }

components:
  schemas:
    Health:
      type: object
      required: [status, version, commit, built, backends]
      properties:
        status:
          type: string
          enum: [ok]
          description: Always "ok" while the process is up.
        version:
          type: string
          description: Semver-ish release tag of the running binary.
          example: v0.0.4
        commit:
          type: string
          description: Short Git SHA the binary was built from.
          example: a91e31c
        built:
          type: string
          description: UTC RFC3339 build timestamp.
          example: "2026-04-26T00:00:00Z"
        backends:
          type: object
          additionalProperties:
            type: string
          description: |
            Per-backend reachability summary. Keys are backend names
            ("postgres", later "clickhouse", "nats"); values are
            either "up" or "down: <reason>".
          example:
            postgres: up

    LoginRequest:
      type: object
      required: [tenant_id, email, password]
      properties:
        tenant_id:
          type: string
          description: Prefixed-TEXT tenant identifier (e.g. tnt-acme).
          example: tnt-default
        email:
          type: string
          format: email
          description: Case-insensitive email; lookup is via citext.
          example: admin@example.com
        password:
          type: string
          format: password
          minLength: 12
          description: Cleartext password. Length floor is enforced server-side.

    User:
      type: object
      required: [id, tenant_id, email, role]
      properties:
        id:
          type: string
          description: Prefixed-TEXT user identifier.
          example: usr-abcdef0123456789
        tenant_id:
          type: string
          example: tnt-default
        email:
          type: string
          format: email
          example: admin@example.com
        role:
          type: string
          enum: [admin, operator, viewer]
          description: Coarse-grained role used by the RBAC layer.

    TestRequest:
      type: object
      required: [kind, target]
      properties:
        kind:
          type: string
          enum: [dns, http, tls]
        target:
          type: string
          description: |
            Protocol-dependent. dns: hostname; http: URL; tls: host:port.
        interval_ms:
          type: integer
          format: int64
          minimum: 1
          default: 30000
        timeout_ms:
          type: integer
          format: int64
          minimum: 1
          default: 5000
        enabled:
          type: boolean
          default: true
        config:
          type: object
          description: Protocol-specific config bag (HTTP method, etc.).
          additionalProperties: true

    Test:
      allOf:
        - $ref: "#/components/schemas/TestRequest"
        - type: object
          required: [id, tenant_id, created_at]
          properties:
            id: { type: string }
            tenant_id: { type: string }
            created_at: { type: string, format: date-time }

    POPRequest:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          pattern: "^pop-"
          description: Operator-chosen identifier. Must start with `pop-`.
          example: pop-lhr-01
        name: { type: string }
        description: { type: string }
        region: { type: string }
        health_url:
          type: string
          format: uri
          description: |
            URL of the POP's health endpoint, used by mesh canaries on
            other POPs.

    POP:
      allOf:
        - $ref: "#/components/schemas/POPRequest"
        - type: object
          required: [tenant_id, created_at]
          properties:
            tenant_id: { type: string }
            created_at: { type: string, format: date-time }

    CanaryResult:
      type: object
      required: [test_id, pop_id, observed_at]
      properties:
        test_id: { type: string }
        pop_id: { type: string }
        observed_at: { type: string, format: date-time }
        latency_ms: { type: number, format: float }
        dns_ms: { type: number, format: float }
        connect_ms: { type: number, format: float }
        tls_ms: { type: number, format: float }
        ttfb_ms: { type: number, format: float }
        status_code: { type: integer, minimum: 0, maximum: 65535 }
        error_kind: { type: string }

    SLORequest:
      type: object
      required: [name, sli_kind, objective_pct, window_seconds]
      properties:
        name: { type: string }
        description: { type: string }
        sli_kind:
          type: string
          enum: [canary_success]
        sli_filter:
          type: object
          description: |
            Optional filter narrowing which canary_results rows count.
            Recognised keys: test_id, pop_id.
          additionalProperties: true
        objective_pct:
          type: number
          format: double
          exclusiveMinimum: 0
          exclusiveMaximum: 1
          example: 0.999
        window_seconds:
          type: integer
          format: int64
          minimum: 1
          example: 2592000
        fast_burn_threshold:
          type: number
          format: double
          minimum: 0
          default: 14.4
        slow_burn_threshold:
          type: number
          format: double
          minimum: 0
          default: 6.0
        notifier_url:
          type: string
          format: uri
          description: |
            Optional webhook URL the evaluator POSTs BurnEvent JSON
            to. Empty string means log-only.
        enabled:
          type: boolean
          default: true

    SLO:
      allOf:
        - $ref: "#/components/schemas/SLORequest"
        - type: object
          required: [id, tenant_id, created_at]
          properties:
            id: { type: string }
            tenant_id: { type: string }
            created_at: { type: string, format: date-time }

    View:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
          description: Human-readable name shown in the workspace UI.
          example: p95 latency by POP
        url:
          type: string
          description: |
            Canonical deep-link to the pinned view. Treated as opaque
            by the server; the frontend interprets it.
          example: /dashboard/canary?metric=latency_p95
        note:
          type: string
          description: Optional short note explaining what the view shows.

    WorkspaceCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 200
          example: Q3 incident review
        description:
          type: string
          maxLength: 2000
        views:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/View" }

    WorkspaceUpdate:
      type: object
      description: |
        All fields are optional. Fields omitted from the body leave
        the corresponding column unchanged. To clear a field, send
        an explicit empty value (empty string for description, empty
        array for views).
      properties:
        name: { type: string, maxLength: 200 }
        description: { type: string, maxLength: 2000 }
        views:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/View" }

    WorkspaceShareRequest:
      type: object
      properties:
        ttl_seconds:
          type: integer
          minimum: 1
          description: |
            Lifetime of the share link in seconds. Omit (or pass 0)
            to use the default 7-day expiry.
          example: 604800

    Workspace:
      type: object
      required: [id, name, views]
      properties:
        id: { type: string, example: wks-abc12345 }
        tenant_id:
          type: string
          description: |
            Tenant that owns the workspace. Stripped to empty string
            on /v1/share/{slug} responses.
        owner_user_id:
          type: string
          description: |
            User who created the workspace. Stripped on /v1/share/{slug}.
        name: { type: string }
        description: { type: string }
        views:
          type: array
          items: { $ref: "#/components/schemas/View" }
        share_slug:
          type: string
          description: |
            Non-empty when the workspace has been shared. Treat as
            opaque; the slug itself is the share secret.
        share_expires_at:
          type: [string, "null"]
          format: date-time
          description: When the share slug stops resolving. NULL means no expiry.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AnnotationCreate:
      type: object
      required: [scope, scope_id, at]
      properties:
        scope:
          type: string
          enum: [canary, pop, test]
        scope_id:
          type: string
          maxLength: 200
          example: tst-foo
        at:
          type: string
          format: date-time
          description: When the annotated event happened (UTC).
        body_md:
          type: string
          maxLength: 4000
          description: Markdown body. Empty string is allowed.

    Annotation:
      allOf:
        - $ref: "#/components/schemas/AnnotationCreate"
        - type: object
          required: [id, tenant_id, author_id, created_at]
          properties:
            id: { type: string, example: ann-abcdef01 }
            tenant_id: { type: string }
            author_id: { type: string }
            created_at: { type: string, format: date-time }

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: ns_session

security:
  - sessionCookie: []
