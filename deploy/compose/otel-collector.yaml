# OpenTelemetry Collector config — NetSite developer stack.
#
# What: receive OTLP from NetSite binaries, fan out to console (debug)
# and to the Prometheus exposer (so prom scrapes the metrics) and the
# debug log (so devs can `docker compose logs otel-collector` and see
# spans land).
#
# How: receivers → processors → exporters, the standard collector
# pipeline. Two pipelines: one for traces, one for metrics. Logs
# pipeline is intentionally absent — NetSite uses slog directly to
# stderr; log shipping is a Phase 5 concern.
#
# Why include a "debug" exporter at all: developers want to see spans
# without bringing up Jaeger/Tempo/Grafana-Tempo. `docker compose logs
# otel-collector` is the lowest-friction way to confirm the wire is hot.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  debug:
    verbosity: basic
  prometheus:
    endpoint: 0.0.0.0:9464
    namespace: netsite

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]
