# NetSite developer compose stack.
#
# What: a local environment that runs the five backing services NetSite
# binaries connect to (Postgres, ClickHouse, NATS JetStream, Prometheus,
# Grafana) plus an OpenTelemetry collector that the binaries export to.
#
# How: every service is pinned to an image digest so `docker compose
# pull` is reproducible across developer machines. Healthchecks gate
# inter-service dependencies — control-plane startup waits for Postgres
# to be ready before running migrations.
#
# Why all six services in one file rather than a Helm chart or k3d
# cluster: developers should be able to clone the repo and run
# `docker compose up -d` with no kubectl, no helm, no kind. The
# production deployment story is Helm (Phase 5 task) and air-gap
# bundles (Phase 4); compose is for `make dev` only.
#
# Why pinned digests, not floating tags like `:16` or `:latest`: when
# `clickhouse:24-alpine` published a breaking change two weeks ago,
# every developer who ran `docker compose pull` got a different stack
# than the developer who ran `docker compose pull` two weeks earlier.
# Pinning by digest eliminates that drift.
#
# To upgrade an image, run:
#   docker pull <name>:<tag>
#   docker inspect --format='{{index .RepoDigests 0}}' <name>:<tag>
# and replace the `image:` line with the new digest.

name: netsite-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: netsite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NETSITE_PG_DB:-netsite}
      POSTGRES_USER: ${NETSITE_PG_USER:-netsite}
      POSTGRES_PASSWORD: ${NETSITE_PG_PASSWORD:-netsite}
    ports:
      - "${NETSITE_PG_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: netsite-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${NETSITE_CH_DB:-netsite}
      CLICKHOUSE_USER: ${NETSITE_CH_USER:-netsite}
      CLICKHOUSE_PASSWORD: ${NETSITE_CH_PASSWORD:-netsite}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${NETSITE_CH_NATIVE_PORT:-9000}:9000"  # native protocol
      - "${NETSITE_CH_HTTP_PORT:-8123}:8123"    # HTTP for ad-hoc queries
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      # Two things matter here:
      #
      # 1. **127.0.0.1, not localhost.** ClickHouse-alpine binds 8123
      #    on 0.0.0.0 (IPv4 only — confirm with `ss -tlnp` inside the
      #    container; you'll see `0.0.0.0:8123` and no `[::]:8123`).
      #    /etc/hosts on alpine resolves `localhost` to both
      #    `127.0.0.1` and `::1`, and busybox wget can pick the IPv6
      #    address first; that connection gets refused (nothing on
      #    ::1:8123) and the healthcheck fails forever even though
      #    the server is up. Forcing 127.0.0.1 makes the resolution
      #    deterministic.
      #
      # 2. **GET + body check, not --spider.** busybox `wget --spider`
      #    sends a HEAD; ClickHouse's /ping handler returns "Ok." on
      #    GET but the HEAD response is implementation-detail-prone.
      #    Issuing a GET and grepping for "Ok" in the body is the
      #    canonical ClickHouse-up test.
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      # Docker Desktop / ARM Macs are slow on the first boot of the
      # alpine image (libnuma's get_mempolicy() syscalls are denied,
      # producing the benign `Operation not permitted` log noise; the
      # entrypoint init phase runs CREATE USER + CREATE DATABASE
      # before the real server starts). 90s is a comfortable margin
      # for the slow-init case; once started, 8123 binds within
      # seconds.
      start_period: 90s

  nats:
    image: nats:2.10-alpine
    container_name: netsite-nats
    restart: unless-stopped
    # `-m 8222` is required: without it NATS does not bind the HTTP
    # monitoring port, the healthcheck below gets connection-refused
    # forever, and the container reports unhealthy even though
    # JetStream on 4222 is fine. The port is exposed via `ports:`
    # below — but exposing the port doesn't make NATS listen on it;
    # only this flag does.
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "${NETSITE_NATS_PORT:-4222}:4222"  # client
      - "${NETSITE_NATS_MGMT_PORT:-8222}:8222"  # http monitoring
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    # 0.149.0 chosen 2026-04-27 after 0.115.0 was deleted from Docker Hub
    # (manifest 404). otel/opentelemetry-collector-contrib's tag retention
    # window is short — when the collector ships a new minor version,
    # older tags eventually disappear. We use a minimal pipeline (otlp
    # receiver, batch processor, debug + prometheus exporters); if any of
    # those got a config-breaking change between 0.115 and 0.149 the
    # failure will surface on `docker compose up` (the collector exits 1
    # with a config-validation error) and the fix is to update
    # otel-collector.yaml. The bump rationale lives here so the next
    # operator hitting a 404 on the registry knows it's a tag-retention
    # issue, not a NetSite issue.
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: netsite-otel
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${NETSITE_OTLP_GRPC_PORT:-4317}:4317"   # OTLP gRPC
      - "${NETSITE_OTLP_HTTP_PORT:-4318}:4318"   # OTLP HTTP
      - "${NETSITE_OTEL_PROM_PORT:-9464}:9464"   # collector's Prometheus exposer
    depends_on:
      prometheus:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: netsite-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${NETSITE_PROM_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Caddy fronts the host-running ns-controlplane with TLS so dev /
  # demo paths get HTTPS without the operator managing certs.
  # See docs/security.md "Demo and dev paths"; CLAUDE.md A11.
  #
  # The `tls internal` directive in Caddyfile makes Caddy issue an
  # internal-CA-signed cert. The first request from the operator's
  # browser shows a one-time trust prompt for that CA; subsequent
  # requests are clean. Production deploys swap `tls internal` for
  # `tls /etc/caddy/cert.pem /etc/caddy/key.pem` or a real ACME
  # config — the rest of the file is unchanged.
  caddy:
    image: caddy:2.10-alpine
    container_name: netsite-caddy
    restart: unless-stopped
    ports:
      - "${NETSITE_CADDY_HTTPS_PORT:-8443}:443"
      - "${NETSITE_CADDY_HTTP_PORT:-8081}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    extra_hosts:
      # Lets `host.docker.internal` resolve on Linux (it's already
      # there on Mac/Win Docker Desktop). Caddy uses this to reach
      # the ns-controlplane running on the host's :8080.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: netsite-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${NETSITE_GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${NETSITE_GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"  # dev only — never in prod
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    ports:
      - "${NETSITE_GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  postgres-data:
  clickhouse-data:
  nats-data:
  prometheus-data:
  grafana-data:
  caddy-data:
  caddy-config:
